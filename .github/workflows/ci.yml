name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yejsira?schema=public
      BETTER_AUTH_SECRET: "ci-only-secret-please-do-not-use-in-production-000"
      BETTER_AUTH_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3000
      PUBLIC_WEB_URL: http://localhost:3000
      VITE_API_URL: http://localhost:3001
      CHAPA_SECRET_KEY: CHASECK_TEST-ci
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yejsira
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @ys/db db:generate
      - name: Prisma migrate deploy
        run: pnpm --filter @ys/db db:migrate:deploy
      - name: Lint (typecheck)
        run: pnpm lint
      - name: Build
        run: pnpm build

  e2e:
    needs: lint-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yejsira?schema=public
      BETTER_AUTH_SECRET: "ci-only-secret-please-do-not-use-in-production-000"
      BETTER_AUTH_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3000
      PUBLIC_WEB_URL: http://localhost:3000
      VITE_API_URL: http://localhost:3001
      CHAPA_SECRET_KEY: CHASECK_TEST-ci
      NODE_ENV: test
      PORT: "3001"
      E2E_BASE_URL: http://localhost:3000
      E2E_API_URL: http://localhost:3001
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yejsira
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate + migrate
        run: |
          pnpm --filter @ys/db db:generate
          pnpm --filter @ys/db db:migrate:deploy
      - name: Build apps
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm --filter @ys/e2e exec playwright install --with-deps chromium
      - name: Start API
        working-directory: apps/api
        run: |
          nohup node dist/index.js > ../../api.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:3001/health > /dev/null; then echo "api up"; break; fi
            sleep 1
          done
      - name: Start Web
        working-directory: apps/web
        run: |
          nohup node .output/server/index.mjs > ../../web.log 2>&1 &
          for i in {1..60}; do
            if curl -sf http://localhost:3000/ > /dev/null; then echo "web up"; break; fi
            sleep 1
          done
      - name: Run Playwright smoke tests
        run: pnpm --filter @ys/e2e test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-logs
          path: |
            api.log
            web.log
